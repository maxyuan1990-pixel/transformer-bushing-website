<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" role="img" aria-label="Bushing CT mounting position and voltage class reference diagram">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f7fa"/>
      <stop offset="1" stop-color="#dce3ea"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a3a5c"/>
      <stop offset="0.3" stop-color="#2b5988"/>
      <stop offset="0.7" stop-color="#2b5988"/>
      <stop offset="1" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="flangeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#546575"/>
      <stop offset="0.5" stop-color="#8a9ba8"/>
      <stop offset="1" stop-color="#546575"/>
    </linearGradient>
    <linearGradient id="terminalGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b76837"/>
      <stop offset="0.5" stop-color="#e89050"/>
      <stop offset="1" stop-color="#b76837"/>
    </linearGradient>
    <linearGradient id="shedGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7a8d9a"/>
      <stop offset="0.5" stop-color="#e8eef4"/>
      <stop offset="1" stop-color="#7a8d9a"/>
    </linearGradient>
    <linearGradient id="oilGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c8d6e0"/>
      <stop offset="0.3" stop-color="#eef3f8"/>
      <stop offset="0.7" stop-color="#eef3f8"/>
      <stop offset="1" stop-color="#c8d6e0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#0f1923" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="720" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#1a3a5c" letter-spacing="0.5">Bushing CT Mounting Position Guide</text>
  <line x1="160" y1="46" x2="440" y2="46" stroke="#f47920" stroke-width="2.5" stroke-linecap="round"/>

  <!-- === BUSHING CROSS-SECTION === -->
  <g transform="translate(210, 70)">
    <!-- Terminal (top) -->
    <rect x="55" y="0" width="70" height="56" rx="8" fill="url(#terminalGrad)"/>
    <text x="90" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fff">Terminal</text>

    <!-- Oil-side insulator (top shed area) -->
    <rect x="46" y="52" width="88" height="120" rx="4" fill="url(#oilGrad)"/>
    <!-- Sheds on oil side -->
    <g fill="url(#shedGrad)">
      <ellipse cx="90" cy="74" rx="62" ry="8"/>
      <ellipse cx="90" cy="94" rx="68" ry="9"/>
      <ellipse cx="90" cy="114" rx="73" ry="9"/>
      <ellipse cx="90" cy="134" rx="78" ry="10"/>
      <ellipse cx="90" cy="154" rx="82" ry="10"/>
    </g>

    <!-- Core body -->
    <rect x="34" y="168" width="112" height="280" rx="6" fill="url(#coreGrad)"/>

    <!-- CT Mounting Zones (on core body) -->
    <!-- Zone 1: 0mm -->
    <g transform="translate(-10, 190)">
      <rect x="0" y="0" width="156" height="48" rx="3" fill="#f47920" fill-opacity="0.12" stroke="#f47920" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="78" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#f47920" font-weight="700">CT 0 mm</text>
      <text x="78" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#66717d">Distribution / Traction</text>
    </g>

    <!-- Zone 2: 150mm -->
    <g transform="translate(-10, 246)">
      <rect x="0" y="0" width="156" height="48" rx="3" fill="#16c7d9" fill-opacity="0.10" stroke="#16c7d9" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="78" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#16c7d9" font-weight="700">CT 150 mm</text>
      <text x="78" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#66717d">Substation Transformer</text>
    </g>

    <!-- Zone 3: 250mm -->
    <g transform="translate(-10, 302)">
      <rect x="0" y="0" width="156" height="48" rx="3" fill="#1a3a5c" fill-opacity="0.08" stroke="#1a3a5c" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="78" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#1a3a5c" font-weight="700">CT 250 mm</text>
      <text x="78" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#66717d">HV Grid Transformer</text>
    </g>

    <!-- Zone 4: 400mm -->
    <g transform="translate(-10, 358)">
      <rect x="0" y="0" width="156" height="48" rx="3" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="78" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#8b5cf6" font-weight="700">CT 400 mm</text>
      <text x="78" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#66717d">GIS / Wall Penetration</text>
    </g>

    <!-- Zone 5: 550mm+ -->
    <g transform="translate(-10, 414)">
      <rect x="0" y="0" width="156" height="38" rx="3" fill="#d9272e" fill-opacity="0.06" stroke="#d9272e" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="78" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#d9272e" font-weight="700">CT 500–700 mm</text>
      <text x="78" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#66717d">EHV / Rail / Critical Grid</text>
    </g>

    <!-- Flange -->
    <rect x="16" y="460" width="148" height="40" rx="6" fill="url(#flangeGrad)"/>
    <text x="90" y="486" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fff">Flange / Ground</text>

    <!-- Air-side insulator -->
    <rect x="24" y="496" width="132" height="90" rx="4" fill="url(#oilGrad)"/>
    <g fill="url(#shedGrad)">
      <ellipse cx="90" cy="514" rx="88" ry="10"/>
      <ellipse cx="90" cy="536" rx="94" ry="11"/>
      <ellipse cx="90" cy="558" rx="100" ry="11"/>
      <ellipse cx="90" cy="578" rx="104" ry="12"/>
    </g>
  </g>

  <!-- === RIGHT SIDE: Voltage class reference === -->
  <g transform="translate(420, 80)">
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1a3a5c">Rated Voltage</text>
    <text x="70" y="16" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1a3a5c">CT Zone</text>

    <g font-family="Inter, sans-serif" font-size="10" fill="#66717d">
      <!-- 12kV -->
      <rect x="0" y="22" width="62" height="14" rx="3" fill="#f47920" fill-opacity="0.15"/>
      <text x="4" y="32" fill="#b85a18" font-weight="700">12–24 kV</text>
      <text x="76" y="32" font-weight="600" fill="#333">0 / 150</text>

      <!-- 40.5kV -->
      <rect x="0" y="42" width="62" height="14" rx="3" fill="#f47920" fill-opacity="0.10"/>
      <text x="4" y="52" fill="#b85a18" font-weight="700">40.5 kV</text>
      <text x="76" y="52" font-weight="600" fill="#333">0 / 150 / 250</text>

      <!-- 72.5kV -->
      <rect x="0" y="62" width="62" height="14" rx="3" fill="#16c7d9" fill-opacity="0.12"/>
      <text x="4" y="72" fill="#0e8a96" font-weight="700">72.5 kV</text>
      <text x="76" y="72" font-weight="600" fill="#333">0 / 250 / 400</text>

      <!-- 126-170kV -->
      <rect x="0" y="82" width="62" height="14" rx="3" fill="#1a3a5c" fill-opacity="0.10"/>
      <text x="4" y="92" fill="#1a3a5c" font-weight="700">126–170 kV</text>
      <text x="76" y="92" font-weight="600" fill="#333">250 / 400 / 550</text>

      <!-- 252-550kV -->
      <rect x="0" y="102" width="62" height="14" rx="3" fill="#8b5cf6" fill-opacity="0.12"/>
      <text x="4" y="112" fill="#5b21b6" font-weight="700">252–550 kV</text>
      <text x="76" y="112" font-weight="600" fill="#333">400 / 500 / 700</text>
    </g>
  </g>

  <!-- Bottom note -->
  <text x="300" y="695" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a95a3">CT position is measured from flange top · Custom mounting available on request</text>
</svg>
